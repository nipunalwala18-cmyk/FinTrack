version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    restart: always

    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  backend:

    build:
      context: ./backend

    depends_on:
      - postgres
      - redis

    env_file:
      - ./backend/.env

    ports:
      - "3000:3000"

  frontend:

    build:
      context: ./frontend

    depends_on:
      - backend

    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
